<!--
  WordPress-pasteable fragment of the Supported Species widget.
  - All CSS is scoped under .orditus-species (no bare body/table/header rules), so it
    will not collide with the WordPress theme. Matches marketing/our-impact.html
    (Barlow font, green #1DC06F).
  - The app script is wrapped in an IIFE and uses namespaced ids (osp-*), so nothing
    leaks onto the page.
  - DATA: this loads species_catalog.js (~11 MB). The <script src> below is RELATIVE so
    this file previews locally next to species_catalog.js. Before pasting into WordPress,
    change it to the absolute URL where species_catalog.js is hosted.
  - WordPress note: the Custom HTML block / security plugins often strip <script>. Paste
    this via a script-allowing block (WPCode, Code Embed) or with unfiltered_html.
-->
<div class="orditus-species">
<style>
  .orditus-species{
    /* Orditus green palette, aligned to marketing/our-impact.html */
    --green-dd:#10402a; --green-d:#15673E; --green:#1DC06F; --green-l:#5BB286;
    --ink:#202020; --muted:#6f7d74; --line:#e6ece8; --bg:#f5f9f6; --card:#fff; --no:#c2ccc6; --gold:#b8860b;
    font-family:"Barlow",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); line-height:1.5; background:var(--bg); -webkit-font-smoothing:antialiased;
  }
  .orditus-species *{margin:0;padding:0;box-sizing:border-box}
  .orditus-species h1,.orditus-species h2,.orditus-species h3,.orditus-species h4{font-family:"Barlow",sans-serif}
  .orditus-species .wrap{max-width:1060px;margin:0 auto;padding:0 20px}
  .orditus-species .wide{max-width:1100px;margin:0 auto;padding:0 20px}
  .orditus-species header{background:linear-gradient(135deg,var(--green-dd),var(--green-d) 55%,var(--green));color:#fff;padding:40px 0 30px;text-align:center}
  .orditus-species header h1{margin:0 0 6px;font-size:1.7rem;font-weight:800;letter-spacing:-.01em}
  .orditus-species header .sub{margin:0 auto;color:#cdeede;max-width:640px;text-transform:uppercase;letter-spacing:.18em;font-size:.78rem;font-weight:700}
  .orditus-species .bignum{font-size:2.6rem;font-weight:800;margin-top:6px}
  .orditus-species .bignum small{font-size:.9rem;font-weight:600;color:#bdebd2;display:block;letter-spacing:.04em}
  .orditus-species .stats2{margin-top:8px;color:#bdebd2;font-size:.9rem}
  .orditus-species .searchbar{margin:-24px auto 0;max-width:1100px;padding:0 20px}
  .orditus-species .searchbar input{display:block;width:100%;max-width:820px;margin:0 auto;padding:13px 16px;border:1px solid var(--line);border-radius:12px;font-size:.92rem;font-family:inherit;box-shadow:0 10px 30px rgba(21,103,62,.12);outline:none}
  .orditus-species .searchbar input:focus{border-color:var(--green)}
  .orditus-species .controls{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:16px 0 4px}
  .orditus-species .chipbtn{font-size:.82rem;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;cursor:pointer}
  .orditus-species .chipbtn.on{background:var(--green-d);border-color:var(--green-d);color:#fff;font-weight:600}
  .orditus-species .legend{color:var(--muted);font-size:.84rem;margin:6px 0}
  .orditus-species .tablewrap{overflow-x:auto}
  .orditus-species table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(21,103,62,.05)}
  .orditus-species th,.orditus-species td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:.94rem;white-space:nowrap}
  .orditus-species th{background:#eef5f0;color:var(--green-d);font-size:.74rem;text-transform:uppercase;letter-spacing:.04em}
  .orditus-species th.c,.orditus-species td.c{text-align:center}
  .orditus-species th.num,.orditus-species td.num{text-align:right;font-variant-numeric:tabular-nums}
  .orditus-species th.sphead{position:relative}
  .orditus-species .rowhint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-transform:none;letter-spacing:normal;font-weight:400;color:var(--muted);font-size:.8rem;pointer-events:none}
  .orditus-species tr.spp{cursor:pointer}
  .orditus-species tr.spp:hover{background:#f3f9f5}
  .orditus-species .spcell{max-width:520px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .orditus-species .common{font-weight:700}
  .orditus-species .latin{font-style:italic;color:var(--muted);font-size:.85rem}
  .orditus-species .asm{color:var(--muted);font-size:.78rem}
  .orditus-species .src{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;border-radius:999px;padding:2px 9px}
  .orditus-species .src.Ensembl{background:var(--green-d)} .orditus-species .src.STRINGdb{background:var(--green-l)} .orditus-species .src.Custom{background:var(--gold)}
  .orditus-species .star{color:var(--gold);font-weight:800}
  .orditus-species .yes{color:var(--green);font-weight:800} .orditus-species .no{color:var(--no)}
  .orditus-species .arrow{color:var(--green);font-weight:800;display:inline-block;width:13px}
  .orditus-species .detail td{background:#fbfdfc;padding:8px 18px 18px;white-space:normal}
  .orditus-species .cat{margin:12px 0 0} .orditus-species .cat h4{margin:0 0 6px;font-size:.74rem;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d)}
  .orditus-species .countnote{margin:2px 0 6px;font-style:italic}
  .orditus-species .catlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:2px 26px}
  .orditus-species .gsrow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:3px 0;border-bottom:1px solid var(--line);font-size:.86rem}
  .orditus-species .gsname{color:var(--ink);min-width:0;overflow-wrap:anywhere}
  .orditus-species .gsnum{white-space:nowrap;text-align:right}
  .orditus-species .gsnum .n{color:var(--green-d);font-weight:700;font-variant-numeric:tabular-nums}
  .orditus-species .gsnum .u{color:var(--muted);font-size:.78rem;margin-left:3px}
  .orditus-species .cta{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 2px}
  .orditus-species .btn{display:inline-block;background:var(--green-d);color:#fff;text-decoration:none;font-weight:600;font-size:.85rem;padding:8px 14px;border-radius:9px}
  .orditus-species .btn.alt{background:#fff;color:var(--green-d);border:1px solid var(--green-d)}
  .orditus-species .note{background:#eef5f0;border:1px solid #d8e9df;border-radius:12px;padding:16px 18px;margin:18px 0;color:var(--ink)}
  .orditus-species .warn{background:#fff8e1;border:1px solid #ffe2a8;color:#7a5a00}
  .orditus-species footer{color:var(--muted);font-size:.8rem;padding:26px 0 50px;text-align:center}
  @media (max-width:640px){
    .orditus-species th[data-k="taxid"], .orditus-species td.num{display:none}
    .orditus-species .rowhint{display:none}
    .orditus-species .catlist{grid-template-columns:1fr}
  }
</style>

  <header><div class="wrap">
    <p class="sub">iDEP &amp; ShinyGO</p>
    <h1>Supported Species</h1>
    <div class="bignum" id="osp-headline">n/a</div>
    <div class="stats2" id="osp-stats2"></div>
  </div></header>

  <div class="searchbar">
    <input id="osp-q" type="text" autocomplete="off"
      placeholder="Common name or latin name (e.g. zebrafish, barley)…">
  </div>

  <div class="wide">
    <div class="controls" id="osp-srcchips"></div>
    <div class="legend" id="osp-legend"></div>
    <div id="osp-results"></div>
    <div class="cta">
      <a class="btn" href="https://bioinformatics.sdstate.edu/idep/" target="_blank" rel="noopener">Analyze your data in iDEP</a>
      <a class="btn alt" href="https://bioinformatics.sdstate.edu/go/" target="_blank" rel="noopener">Run enrichment in ShinyGO</a>
    </div>
  </div>

  <footer><div class="wrap"><span id="osp-ver-line"></span> Sources: Ensembl (curated), STRING-db (broad baseline), Custom.</div></footer>

<!-- DATA: hosted on GitHub Pages (orditus-llc/supported-species); update URL if repo moves -->
<script src="https://orditus-llc.github.io/supported-species/species_catalog.js"></script>
<script>
(function(){
  var results=document.getElementById("osp-results"),
      legend=document.getElementById("osp-legend"),
      qEl=document.getElementById("osp-q");
  function clean(x){ return (x||"").replace(/ /g," ").replace(/\*+\s*$/,"").trim(); }
  function cleanName(s){ return (s||"?").replace(/\s*STRINGdb\s*$/i,"").trim() || "?"; }  // Source badge already says STRING-db
  function srcClass(s){ return (s==="STRING-db")?"STRINGdb":(s||"Ensembl"); }

  if (typeof window.CATALOG==="undefined") {
    results.innerHTML='<div class="note warn"><b>No data yet.</b> The <code>species_catalog.js</code> data file did not load. Check the script URL.</div>';
    return;
  }
  var C=window.CATALOG, SP=C.species.slice();
  SP.forEach(function(sp){ sp._s=((sp.common||"")+" "+(sp.latin||"")+" "+(sp.source||"")+" "+(sp.taxid||"")).toLowerCase(); });

  var total=C.meta.total_species||SP.length;
  document.getElementById("osp-headline").textContent=Number(total).toLocaleString();
  var bs=C.meta.by_source||{}; var order=["Ensembl","STRING-db","Custom"];
  var keys=order.filter(function(k){return k in bs;}); for(var k in bs){ if(keys.indexOf(k)<0) keys.push(k); }
  var parts=keys.map(function(k){ return Number(bs[k]).toLocaleString()+" "+k; });
  document.getElementById("osp-stats2").textContent=parts.join("  ·  ");
  document.getElementById("osp-ver-line").textContent="Data version "+C.meta.db_ver+".";

  var SRC_CLASSES=["Ensembl","STRING-db","Custom"];
  var SRC_COLS=[["kegg","KEGG"],["go","GO terms"],["reactome","Reactome"],["msigdb","MSigDB"]];
  function flag(sp,key){ var v=(sp.has && key in sp.has)?sp.has[key]:(key==="kegg"?sp.kegg:undefined);
    if(v===true)  return '<span class="yes" title="Available">&#10003;</span>';
    if(v===false) return '<span class="no" title="Not included">&ndash;</span>';
    return '<span class="no" title="Supported; full breakdown not yet listed">&ndash;</span>'; }
  var activeSrc=null, sortKey="featured", sortDir=-1, LIMIT=100, t=null;

  function sc(){ var h='<span class="legend" style="margin-right:4px">Source:</span>';
    SRC_CLASSES.forEach(function(s){ h+='<span class="chipbtn'+(activeSrc===s?" on":"")+'" data-s="'+s+'">'+s+'</span>'; });
    document.getElementById("osp-srcchips").innerHTML=h; }

  function matches(sp,q){
    if (activeSrc && sp.sclass!==activeSrc) return false;
    if (!q) return true;
    return q.toLowerCase().split(/\s+/).every(function(tok){
      if (sp._s.indexOf(tok)>=0) return true;
      if (tok==="kegg" && sp.kegg) return true;
      if (sp.categories){ for(var cat in sp.categories){ var a=sp.categories[cat];
        for(var j=0;j<a.length;j++){ if((a[j].name||"").toLowerCase().indexOf(tok)>=0) return true; } } }
      return false; });
  }

  function detailHTML(sp){
    var meta=(sp.assembly?('Assembly '+sp.assembly+'. '):'');
    if (!sp.featured || !sp.categories){
      return '<div class="legend">'+meta+'Standard GO/KEGG baseline. A full gene-set breakdown is available for '+(C.meta.n_with_depth||0)+' species so far.</div>';
    }
    var isString=(sp.sclass==="STRING-db"), unit=isString?"annotations":"sets";
    var countNote=isString
      ? "Counts show gene-to-term annotations (memberships), not the number of gene sets."
      : "Counts show the number of gene sets in each collection.";
    var h='<div class="legend" style="margin-bottom:2px">'+meta+'<b>'+(sp.n_sources||0)+'</b> gene-set sources.</div>'
      +'<div class="legend countnote">'+countNote+'</div>';
    for (var cat in sp.categories){ var arr=(sp.categories[cat]||[]).filter(function(it){return clean(it.name);}); if(!arr.length) continue;
      h+='<div class="cat"><h4>'+cat+' ('+arr.length+')</h4><div class="catlist">';
      arr.forEach(function(it){ var nm=clean(it.name);
        var n=(it.n!=null)?'<span class="n">'+Number(it.n).toLocaleString()+'</span> <span class="u">'+unit+'</span>':'';
        h+='<div class="gsrow"><span class="gsname">'+nm+'</span><span class="gsnum">'+n+'</span></div>'; });
      h+='</div></div>'; }
    return h;
  }

  function render(){
    var q=qEl.value.trim();
    var rows=SP.filter(function(s){return matches(s,q);});
    // default (no query, no filter): show featured first so the page isn't a 13k dump
    rows.sort(function(a,b){ if(sortKey==="featured"){ var d=(b.featured?1:0)-(a.featured?1:0); if(d) return d; return (b.n_sources||0)-(a.n_sources||0); }
      var av=a[sortKey],bv=b[sortKey]; return (typeof av==="string")?sortDir*((av||"").localeCompare(bv||"")):sortDir*((av||0)-(bv||0)); });
    var totalN=rows.length, capped=rows.slice(0,LIMIT);
    legend.textContent=totalN.toLocaleString()+' of '+SP.length.toLocaleString()+' species'+(q?' for "'+q+'"':'')
      +(totalN>LIMIT?(' (showing first '+LIMIT+')'):'')+'.';
    if(!totalN){ results.innerHTML='<div class="note">We could not find that. Try the latin name (e.g. Mus musculus) or the taxonomy id (e.g. 10090). Most sequenced organisms are supported through the broad STRING-db set.</div>'; return; }
    var h='<div class="tablewrap"><table><thead><tr>'
      +'<th class="sphead" data-k="common">Species<span class="rowhint">Click a row for details</span></th><th data-k="sclass">Source</th>'
      +'<th class="num" data-k="taxid">Tax ID</th>'
      + SRC_COLS.map(function(p){return '<th class="c">'+p[1]+'</th>';}).join('')
      +'</tr></thead><tbody>';
    capped.forEach(function(sp,idx){
      var nm=cleanName(sp.common);
      h+='<tr class="spp" data-i="'+idx+'"><td><div class="spcell" title="'+nm+'"><span class="arrow">&#9656;</span> <span class="common">'+nm+'</span> '
        +(sp.latin?'<span class="latin">'+sp.latin+'</span>':'')+(sp.assembly?' <span class="asm">'+sp.assembly+'</span>':'')+'</div></td>'
        +'<td><span class="src '+srcClass(sp.sclass)+'">'+(sp.sclass||"?")+'</span></td>'
        +'<td class="num">'+(sp.taxid!=null?sp.taxid:'')+'</td>'
        + SRC_COLS.map(function(p){return '<td class="c">'+flag(sp,p[0])+'</td>';}).join('')
        +'</tr>'
        +'<tr class="detail" id="osp-d'+idx+'" style="display:none"><td colspan="'+(3+SRC_COLS.length)+'">'+detailHTML(sp)+'</td></tr>';
    });
    h+='</tbody></table></div>'; results.innerHTML=h;
    Array.prototype.forEach.call(results.querySelectorAll("tr.spp"),function(tr){ tr.addEventListener("click",function(){
      var d=document.getElementById("osp-d"+tr.getAttribute("data-i")); var open=d.style.display!=="none";
      d.style.display=open?"none":"table-row"; tr.querySelector(".arrow").innerHTML=open?"&#9656;":"&#9662;"; }); });
  }
  function debounced(){ clearTimeout(t); t=setTimeout(render,130); }
  qEl.addEventListener("input",debounced);
  document.getElementById("osp-srcchips").addEventListener("click",function(e){ var s=e.target.getAttribute("data-s"); if(!s) return; activeSrc=(activeSrc===s)?null:s; sc(); render(); });
  sc(); render();
})();
</script>
</div>
